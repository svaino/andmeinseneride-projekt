# PostgreSQL + pipeline + Superset + Airflow 3.1.8 (LocalExecutor)
#
# Käivitamine:
#   cp .env.example .env
#   docker compose up -d --build
#
# Varasem stack ilma Airflow'ta: _compose.yml

x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.1.8}
  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER:-airflow}:${AIRFLOW_PASSWORD:-airflow}@airflow-db:5432/${AIRFLOW_DB:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW_CONN_ANALYTICS_DB: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    DB_HOST: db
    DB_PORT: "5432"
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB}
    ARIREGISTER_USER: ${ARIREGISTER_USER}
    ARIREGISTER_PASSWORD: ${ARIREGISTER_PASSWORD}
    STAT_API_URL: ${STAT_API_URL}
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-dbt-core~=1.10.0 dbt-postgres==1.10.0 requests python-dotenv psycopg2-binary beautifulsoup4 pandas sqlalchemy}
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    AIRFLOW__OPERATORS__BASH_COMMAND_PREFIX: "bash -c"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/config:/opt/airflow/config
    - ./airflow/plugins:/opt/airflow/plugins
    - ./dbt_project:/opt/airflow/dbt_project
    - dbt-target:/opt/airflow/dbt_project/rik_stat_dbt/target
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    airflow-db:
      condition: service_healthy
    db:
      condition: service_healthy

services:

  db:
    image: pgduckdb/pgduckdb:18-v1.1.1
    container_name: andmeinseneeria-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT_HOST:-55432}:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-praktikum}"]
      interval: 10s
      retries: 5
      start_period: 5s

  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name: andmeinseneeria-dbt
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DBT_PROFILES_DIR: /app/dbt_project/rik_stat_dbt
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./dbt_project:/app/dbt_project
    working_dir: /app/dbt_project/rik_stat_dbt
    ports:
      - "18080:8080"
    tty: true

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: andmeinseneeria-pipeline
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DBT_PROFILES_DIR: /app/dbt_project/rik_stat_dbt
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./dbt_project:/app/dbt_project
    working_dir: /app
    tty: true

  superset-db:
    image: postgres:16
    container_name: andmeinseneeria-superset-db
    environment:
      POSTGRES_USER: ${SUPERSET_DB_USER}
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD}
      POSTGRES_DB: ${SUPERSET_DB_NAME}
    volumes:
      - superset-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUPERSET_DB_USER} -d ${SUPERSET_DB_NAME}"]
      interval: 5s
      retries: 10
    restart: always

  superset-init:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: andmeinseneeria-superset-init
    depends_on:
      superset-db:
        condition: service_healthy
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py
      - superset-home:/app/superset_home
      - ./superset/dashboards:/app/dashboards
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      DATABASE_URI: "postgresql+psycopg2://${SUPERSET_DB_USER}:${SUPERSET_DB_PASSWORD}@superset-db:5432/${SUPERSET_DB_NAME}"
      SECRET_KEY: ${SUPERSET_SECRET_KEY}
      ADMIN_USERNAME: ${SUPERSET_ADMIN_USER}
      ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
    command:
        - /bin/sh
        - -c
        - |
          superset db upgrade &&
          superset fab create-admin --username ${SUPERSET_ADMIN_USER} --firstname Admin --lastname User --email ${SUPERSET_ADMIN_EMAIL} --password ${SUPERSET_ADMIN_PASSWORD} &&
          superset init &&
          find /app/dashboards -name '*.zip' | head -1 | xargs -I {} superset import-dashboards --path {} --username ${SUPERSET_ADMIN_USER} &&
          echo "IMPORT DONE"
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: andmeinseneeria-superset
    depends_on:
      superset-init:
        condition: service_completed_successfully
    ports:
      - "${SUPERSET_PORT_HOST:-8088}:8088"
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py
      - superset-home:/app/superset_home
      - ./superset/dashboards:/app/dashboards
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      DATABASE_URI: "postgresql+psycopg2://${SUPERSET_DB_USER}:${SUPERSET_DB_PASSWORD}@superset-db:5432/${SUPERSET_DB_NAME}"
      SECRET_KEY: ${SUPERSET_SECRET_KEY}
    command: ["/app/docker/entrypoints/run-server.sh"]
    restart: always

  airflow-db:
    image: postgres:16
    container_name: andmeinseneeria-airflow-db
    environment:
      POSTGRES_USER: ${AIRFLOW_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB:-airflow}
    volumes:
      - airflow-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_USER:-airflow}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    container_name: andmeinseneeria-airflow-api
    ports:
      - "${AIRFLOW_PORT_HOST:-8081}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    container_name: andmeinseneeria-airflow-scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    container_name: andmeinseneeria-airflow-dagproc
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: andmeinseneeria-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING: AIRFLOW_UID not set!\e[0m"
          echo "If you are on Linux, set AIRFLOW_UID environment variable."
          echo
          export AIRFLOW_UID=$$(id -u)
        fi
        echo
        echo "Creating missing opt dirs if missing:"
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Airflow version:"
        /entrypoint airflow version
        echo
        echo "Running airflow config list to create default config file if missing."
        /entrypoint airflow config list >/dev/null
        echo
        echo "Change ownership of files in /opt/airflow to ${AIRFLOW_UID}:0"
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"


volumes:
  pgdata:
  superset-db-volume:
  superset-home:
  airflow-db-volume:
  airflow-logs:
  dbt-target: