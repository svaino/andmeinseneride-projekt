# compose.yml.example — Projekti Docker Compose mall
#
# See fail näitab põhistruktuuri. Kopeeri see compose.yml-iks ja kohanda.
# Erinevad näidisprojektid näitavad konkreetseid stacke (Airflow+dbt, Streamlit jne).
#
# Käivitamine pärast kohandamist:
#   cp .env.example .env
#   docker compose up -d --build

services:

  # --- Andmebaas ---
  # Kõigil projektidel on vaja andmebaasi. pgDuckDB toetab nii PostgreSQL-i kui DuckDB päringuid.
  db:
    image: pgduckdb/pgduckdb:18-v1.1.1
    container_name: andmeinseneeria-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT_HOST:-55432}:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d   # SQL-skriptid, mis käivituvad esimesel korral
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-praktikum}"]
      interval: 10s
      retries: 5
      start_period: 5s

  # --- Töövoo konteiner (nt Python ETL skript) ---
  # Kasuta seda, kui sul on lihtne Python-põhine töövoog ilma Airflow'ta.
  # Airflow-põhise stacki puhul asenda selle sektsioon airflow/* teenustega
  # (vaata naidisprojekt-ilmaandmed-dbt-ja-airflow/compose.yml).
  #
  # pipeline:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.app
  #   container_name: [PROJEKTI-NIMI]-pipeline
  #   env_file:
  #     - .env
  #   environment:
  #     DB_HOST: db
  #     DB_PORT: "5432"
  #     DB_USER: ${POSTGRES_USER}
  #     DB_PASSWORD: ${POSTGRES_PASSWORD}
  #     DB_NAME: ${POSTGRES_DB}
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   volumes:
  #     - ./scripts:/app/scripts
  #   working_dir: /app
  #   tty: true

  # --- Näidikulaud ---
  # Streamliti põhine näide. Superset-põhise stacki puhul vaata
  # naidisprojekt-ilmaandmed-dbt-ja-airflow/compose.yml.
  #
  # dashboard:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.app
  #   container_name: [PROJEKTI-NIMI]-dashboard
  #   env_file:
  #     - .env
  #   environment:
  #     DB_HOST: db
  #     DB_PORT: "5432"
  #     DB_USER: ${POSTGRES_USER}
  #     DB_PASSWORD: ${POSTGRES_PASSWORD}
  #     DB_NAME: ${POSTGRES_DB}
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   ports:
  #     - "${DASHBOARD_PORT_HOST:-8501}:8501"
  #   command: ["streamlit", "run", "dashboard/app.py", "--server.address=0.0.0.0"]

volumes:
  pgdata:
